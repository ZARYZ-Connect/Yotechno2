services:
  # ─── Django Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yotechno-backend
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,yotechno-backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:8090,http://127.0.0.1:8090"
      DB_PATH: "/app/data/db.sqlite3"
    volumes:
      - sqlite_data:/app/data
    ports:
      - "8015:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/solutions/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── React Frontend ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: yotechno-frontend
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite_data:
    name: yotechno_sqlite_data
